services:
  # Fast CI: ShellCheck + Bats only. Uses the prebuilt test-tools image
  # (alpine: bash + bats + bats-{support,assert,mock} + shellcheck +
  # hadolint baked in), so _install_deps short-circuits via its
  # `command -v bats` guard — no per-run apt-install. TEST_TOOLS_IMAGE
  # can be overridden to pin a specific tag during local rebuild flows;
  # default :latest tracks the most recent template release tag because
  # release-test-tools.yaml rebuilds it on every v* push.
  ci:
    image: ${TEST_TOOLS_IMAGE:-ghcr.io/ycpss91255-docker/test-tools:latest}
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
    entrypoint: /bin/bash
    command:
      - -c
      - ./script/ci/ci.sh --ci

  # Behavioural (#249): same image as `ci` but with the host docker
  # socket mounted so test/behavioural/*.bats can drive
  # `docker buildx build --target runtime-test ...` against synthesized
  # fixtures and assert build pass/fail. Opt-in: never invoked by the
  # default `make test` flow. Local users run via `make
  # test-behavioural`; CI runs via a dedicated Behavioural Test job
  # in self-test.yaml. The dedicated buildx builder (template-behavioural)
  # is created/pruned per ci.sh --behavioural run so this service does
  # NOT pollute the host's default buildx context or shared image cache.
  ci-behavioural:
    image: ${TEST_TOOLS_IMAGE:-ghcr.io/ycpss91255-docker/test-tools:latest}
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - MOUNT_DOCKER_SOCK=1
    entrypoint: /bin/bash
    command:
      - -c
      - ./script/ci/ci.sh --ci --behavioural

  # Coverage: same pipeline plus kcov instrumentation. Stays on kcov/kcov
  # because kcov is not in the alpine test-tools image (building it from
  # source would balloon image size and pull in deps unrelated to fast CI).
  # APT_MIRROR_DEBIAN is opt-in for networks where deb.debian.org is
  # unreachable; _install_deps rewrites /etc/apt/sources.list before
  # apt-installing bats/bats-support/bats-assert + git-cloning bats-mock.
  coverage:
    image: kcov/kcov
    security_opt:
      - seccomp=unconfined
    volumes:
      - .:/source
    working_dir: /source
    environment:
      - HOST_UID=${HOST_UID:-1000}
      - HOST_GID=${HOST_GID:-1000}
      - APT_MIRROR_DEBIAN=${APT_MIRROR_DEBIAN:-deb.debian.org}
    entrypoint: /bin/bash
    command:
      - -c
      - ./script/ci/ci.sh --ci
