name: Self Test

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CI (ShellCheck + Bats + Kcov)
        run: ./script/ci/ci.sh

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          fail_ci_if_error: false

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="template-${VERSION}"

          mkdir -p "${ARCHIVE_NAME}"
          cp -r init.sh upgrade.sh \
                .hadolint.yaml Makefile.ci compose.yaml \
                config/ dockerfile/ test/ script/ doc/ \
                README.md LICENSE \
                "${ARCHIVE_NAME}/"

          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          zip -r  "${ARCHIVE_NAME}.zip"    "${ARCHIVE_NAME}"

      - name: Extract release notes for current tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Extract the section for current version from CHANGELOG.md
          # Matches "## [vX.Y.Z]" or "## [vX.Y.Z-rcN]" until the next "## ["
          awk -v ver="${VERSION}" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found
          ' doc/changelog/CHANGELOG.md > /tmp/release-notes.md
          echo "--- Extracted release notes ---"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            template-*.tar.gz
            template-*.zip
