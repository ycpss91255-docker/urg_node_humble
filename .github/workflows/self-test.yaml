name: Self Test

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  actionlint:
    # Catch GHA workflow-validator semantic regressions (the
    # class behind the v0.26.0-rc1 wedge, #297) before the
    # bats / docker matrix burns CI minutes. Runs first; the
    # other jobs gate on it. Refs #305.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint via Docker
        run: |
          set -euo pipefail
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo:ro" \
            -w /repo \
            rhysd/actionlint:1.7.7 \
            -color

  classify:
    # Per-PR diff classifier (pure shell, no third-party GHA action — same
    # spirit as #273 Phase 2's build-worker.yaml classifier). Emits two
    # outputs for downstream jobs:
    #   code_changed         — false if the PR changes only doc/** + README.md + LICENSE
    #   behavioural_relevant — false if the PR does NOT touch any path in the
    #                          behavioural block-list (script/entrypoint.sh,
    #                          compose.yaml, Dockerfile.example,
    #                          Dockerfile.test-tools, build/run/exec/stop.sh,
    #                          init.sh, upgrade.sh, test/behavioural/**,
    #                          .github/workflows/**)
    # Non-PR events (push / tag / workflow_dispatch) default to 'true' on
    # both outputs so post-merge / release builds run the full suite.
    # See issue #317 for the full design and path-list rationale.
    needs: actionlint
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.diff.outputs.code_changed }}
      behavioural_relevant: ${{ steps.diff.outputs.behavioural_relevant }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        # `-e` is intentionally omitted. The `test` job is the only branch-
        # protection-required check, and the chain `test needs classify`
        # means any non-zero exit here blocks every PR merge (Q4 fail-closed
        # chain — see issue #317). Failing open by treating diff errors as
        # "differences exist" (handled naturally by the `if git diff` form,
        # which routes any non-zero exit to the else branch) costs at most
        # one needless full-suite run on a misclassified doc-only PR — far
        # cheaper than wedging the merge queue.
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" != "pull_request" ]]; then
            # push to main / tag push / workflow_dispatch — full suite.
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
            echo "behavioural_relevant=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          # Fork PRs (and some squash-merged histories) reach this step
          # without the base ref present in the local repo: actions/checkout
          # with `fetch-depth: 0` fetches the head branch's full history but
          # does NOT fetch the base. Pre-fetch defensively; `|| true` lets
          # us continue even if the fetch fails, because the diff below
          # will then return non-zero and the `if` falls through to the
          # fail-open path.
          git fetch origin \
            "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
            --depth=200 >/dev/null 2>&1 || true
          BASE="origin/${BASE_REF}"
          # code_changed: anything outside the doc-only allow-list.
          if git diff --quiet "${BASE}"...HEAD \
               -- ':!doc/**' ':!README.md' ':!LICENSE'; then
            echo "code_changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "code_changed=true" >> "${GITHUB_OUTPUT}"
          fi
          # behavioural_relevant: block-list (Q5 in #317).
          if git diff --quiet "${BASE}"...HEAD \
               -- 'script/entrypoint.sh' \
                  'compose.yaml' \
                  'dockerfile/Dockerfile.example' \
                  'dockerfile/Dockerfile.test-tools' \
                  'script/docker/build.sh' \
                  'script/docker/run.sh' \
                  'script/docker/exec.sh' \
                  'script/docker/stop.sh' \
                  'test/behavioural/**' \
                  'init.sh' 'upgrade.sh' \
                  '.github/workflows/**'; then
            echo "behavioural_relevant=false" >> "${GITHUB_OUTPUT}"
          else
            echo "behavioural_relevant=true" >> "${GITHUB_OUTPUT}"
          fi

  test:
    needs: [actionlint, classify]
    runs-on: ubuntu-latest
    steps:
      # Doc-only short-circuit: `test` is the only branch-protection-required
      # status check on `main`, so we must always REPORT a SUCCESS result.
      # `skipped` is NOT `success` for required checks. The pattern is: keep
      # the job in the graph, branch internally, exit 0 on doc-only PRs.
      - name: Doc-only short-circuit
        if: needs.classify.outputs.code_changed == 'false'
        run: |
          echo "Doc-only PR — bats / shellcheck / kcov skipped; reporting SUCCESS for branch protection."

      - name: Checkout
        if: needs.classify.outputs.code_changed == 'true'
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        if: needs.classify.outputs.code_changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        id: obtain
        if: needs.classify.outputs.code_changed == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        # Layer 1: PR touched Dockerfile.test-tools -> must rebuild from
        # source (the :main rolling tag still reflects the pre-PR state).
        # Layer 2: try pulling the rolling :main tag and re-tag locally;
        # avoids a buildx run on the hot path (every non-Dockerfile-test-
        # tools PR).
        # Layer 3: pull failed (first bootstrap of :main, network, GHCR
        # auth gap) -> emit build_local=true and let the buildx step
        # below take over with GHA cache.
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              echo "build_local=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          if docker pull --platform linux/amd64 \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            echo "build_local=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "build_local=true" >> "${GITHUB_OUTPUT}"

      - name: Build test-tools:local (with GHA cache)
        if: ${{ needs.classify.outputs.code_changed == 'true' && steps.obtain.outputs.build_local == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.test-tools
          tags: test-tools:local
          load: true
          cache-from: type=gha,scope=test-tools
          cache-to: type=gha,scope=test-tools,mode=max

      - name: Run CI (ShellCheck + Bats + Kcov)
        if: needs.classify.outputs.code_changed == 'true'
        env:
          TEST_TOOLS_IMAGE: test-tools:local
        run: ./script/ci/ci.sh

      - name: Upload coverage to Codecov
        if: ${{ needs.classify.outputs.code_changed == 'true' && always() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
          fail_ci_if_error: false

  integration-e2e:
    name: Integration E2E (init.sh → build → run → exec → stop)
    needs: [actionlint, classify]
    if: needs.classify.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        # Use the docker driver (not docker-container) so test-tools:local
        # lives in the host docker daemon's image store. The subsequent
        # `./build.sh test` invokes `docker compose build`, whose
        # `FROM ${TEST_TOOLS_IMAGE}` lookup hits the host daemon — with
        # docker-container, buildx would have its own isolated store and
        # the FROM would try to pull from docker.io and fail
        # (`pull access denied, repository does not exist`). Trade-off:
        # the layer-3 fallback rebuild here is uncached (GHA cache
        # requires docker-container); since the hot path is `docker pull
        # :main` (no buildx involved), the cache loss only matters in
        # the bootstrap window or when Dockerfile.test-tools changes.
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        # Inline rebuild on layers 1 + 3 because the docker driver above
        # cannot use docker/build-push-action's GHA cache. Plain
        # `docker build` matches the pre-P2 behaviour in this job; the
        # net effect of P2 here is the hot path (layer 2) skipping the
        # rebuild entirely.
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              docker build \
                -t test-tools:local \
                -f dockerfile/Dockerfile.test-tools .
              exit 0
            fi
          fi
          if docker pull --platform linux/amd64 \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            exit 0
          fi
          docker build \
            -t test-tools:local \
            -f dockerfile/Dockerfile.test-tools .

      - name: Create temp repo and run init.sh
        run: |
          set -euo pipefail
          TMP_ROOT="$(mktemp -d)"
          REPO_NAME="e2e_test"
          REPO_DIR="${TMP_ROOT}/${REPO_NAME}"
          mkdir -p "${REPO_DIR}/.base"

          # Mirror current template into the synthetic repo
          cp -a "${GITHUB_WORKSPACE}/." "${REPO_DIR}/.base/"

          cd "${REPO_DIR}"
          bash .base/init.sh

          # Sanity: verify symlinks resolve and core files exist
          test -L build.sh && test -L run.sh && test -L exec.sh && test -L stop.sh
          test -L setup_tui.sh
          test -f Dockerfile && test -f compose.yaml && test -f config/docker/setup.conf

          echo "REPO_DIR=${REPO_DIR}" >> "${GITHUB_ENV}"

      - name: Build test stage (build.sh test)
        working-directory: ${{ env.REPO_DIR }}
        env:
          # build.sh skips its internal test-tools:local build when this
          # env is set (#317 P2). The pre-built image from the Obtain
          # step above is already loaded into the host's docker daemon,
          # so `docker compose build`'s Dockerfile.example `FROM
          # ${TEST_TOOLS_IMAGE}` resolves locally without re-running
          # the dockerfile/Dockerfile.test-tools build.
          TEST_TOOLS_IMAGE: test-tools:local
        run: |
          ./build.sh test

      - name: Build devel stage
        working-directory: ${{ env.REPO_DIR }}
        run: |
          ./build.sh

      - name: Run container in detach mode and exec into it
        working-directory: ${{ env.REPO_DIR }}
        run: |
          ./run.sh -d
          # Verify the container is up and reachable via exec.sh
          ./exec.sh echo "exec.sh OK from CI"
          ./exec.sh whoami

      - name: Stop and verify cleanup
        working-directory: ${{ env.REPO_DIR }}
        run: |
          ./stop.sh
          # No project containers should remain
          if docker ps --format '{{.Names}}' | grep -q '^e2e_test$'; then
            echo "ERROR: container still running after stop.sh"
            docker ps
            exit 1
          fi

  behavioural:
    name: Behavioural Test (runtime-test smoke gate, #249)
    needs: [actionlint, classify]
    # P1 (#317) gates on code_changed only; P3 will tighten to behavioural_relevant.
    if: needs.classify.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Obtain test-tools:local (#317 P2 3-layer fallback)
        id: obtain
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            git fetch origin \
              "${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
              --depth=200 >/dev/null 2>&1 || true
            if ! git diff --quiet \
                 "origin/${BASE_REF}"...HEAD \
                 -- dockerfile/Dockerfile.test-tools; then
              echo "build_local=true" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi
          if docker pull --platform linux/amd64 \
               ghcr.io/ycpss91255-docker/test-tools:main 2>/dev/null; then
            docker tag \
              ghcr.io/ycpss91255-docker/test-tools:main \
              test-tools:local
            echo "build_local=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "build_local=true" >> "${GITHUB_OUTPUT}"

      - name: Build test-tools:local (with GHA cache)
        if: ${{ steps.obtain.outputs.build_local == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile/Dockerfile.test-tools
          tags: test-tools:local
          load: true
          cache-from: type=gha,scope=test-tools
          cache-to: type=gha,scope=test-tools,mode=max

      - name: Run behavioural specs (docker.sock-mounted ci-behavioural service)
        env:
          TEST_TOOLS_IMAGE: test-tools:local
        run: docker compose run --rm ci-behavioural

  release:
    needs: [test, integration-e2e, behavioural]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE_NAME="template-${VERSION}"

          mkdir -p "${ARCHIVE_NAME}"
          cp -r init.sh upgrade.sh \
                .hadolint.yaml Makefile.ci compose.yaml \
                config/ dockerfile/ test/ script/ doc/ \
                README.md LICENSE \
                "${ARCHIVE_NAME}/"

          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          zip -r  "${ARCHIVE_NAME}.zip"    "${ARCHIVE_NAME}"

      - name: Extract release notes for current tag
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Extract the section for current version from CHANGELOG.md
          # Matches "## [vX.Y.Z]" or "## [vX.Y.Z-rcN]" until the next "## ["
          awk -v ver="${VERSION}" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) { found=1; next }
            }
            found
          ' doc/changelog/CHANGELOG.md > /tmp/release-notes.md
          echo "--- Extracted release notes ---"
          cat /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            template-*.tar.gz
            template-*.zip
