name: Docker Build & Smoke Test

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
        description: "Container image name (e.g. ros_noetic)"
      build_args:
        required: false
        type: string
        default: ""
        description: "Multi-line KEY=VALUE build args"
      build_runtime:
        required: false
        type: boolean
        default: true
        description: "Whether to build runtime stage"
      test_tools_version:
        required: false
        type: string
        default: "latest"
        description: |
          Tag for the `ghcr.io/ycpss91255-docker/test-tools:<tag>` image
          consumed as a build-arg by the downstream Dockerfile's test
          stage. Caller should pin this to the template release they
          upgraded from (e.g. `test_tools_version: v0.10.1`) for
          reproducibility; default `latest` works but loses
          determinism against an in-flight template release.

          Replaces the earlier GITHUB_WORKFLOW_REF parsing, which was
          read the caller's own tag ref (e.g. a downstream repo's
          `v1.5.0`) rather than the template's pinned @tag, so
          downstream tag pushes would try to pull
          `ghcr.io/.../test-tools:<downstream-tag>` which never exists.
      platforms:
        required: false
        type: string
        default: "linux/amd64"
        description: |
          Comma-separated target platforms. Each runs as a parallel job on
          its own native runner (linux/amd64 → ubuntu-latest, linux/arm64
          → ubuntu-24.04-arm), so arm64 builds avoid QEMU emulation
          (which would take 30-60 min per run on an amd64 host) and stay
          in the 5-15 min range.

          Each matrix shard runs the full pipeline (test-tools build,
          test stage smoke tests, devel stage, runtime stage) natively
          for its platform.

          Default "linux/amd64" preserves single-platform behavior —
          existing downstream repos see no CI change until they opt in
          by adding `platforms: linux/amd64,linux/arm64` in their
          main.yaml call.

          Supported values: linux/amd64, linux/arm64. Other values are
          rejected by the compute-matrix step.
      context_path:
        required: false
        type: string
        default: "."
        description: |
          Build context passed to docker/build-push-action's `context:`
          input. Defaults to repo root for backwards compatibility with
          the standard template layout (Dockerfile + compose.yaml at
          repo root).

          Set to a subdirectory (e.g. `docker`) when the consumer repo
          keeps its docker assets nested — typically to keep
          template-managed files separated from application source. The
          path is relative to the repo root after `actions/checkout`.

          Pairs with `dockerfile_path`; both inputs are independent so
          callers can override one without the other.
      dockerfile_path:
        required: false
        type: string
        default: ""
        description: |
          Optional explicit Dockerfile path relative to the repo root.
          Empty string (default) defers to `<context_path>/Dockerfile`,
          matching docker/build-push-action's own default.

          Override only when the Dockerfile is named non-standardly or
          lives outside `<context_path>/` — most consumers should leave
          this empty and rely on the implicit `<context_path>/Dockerfile`.

jobs:
  # ────────────────────────────────────────────────────────────────
  # Parse the comma-separated `platforms` input into a matrix
  # definition. Each supported platform gets the right runner label
  # (native arm64 runners are available for public repos under the
  # ycpss91255-docker org) and a canonical HARDWARE build-arg value.
  # ────────────────────────────────────────────────────────────────
  compute-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          items=""
          IFS=',' read -ra plats <<< "${PLATFORMS}"
          for p in "${plats[@]}"; do
            p="$(echo "${p}" | tr -d '[:space:]')"
            case "${p}" in
              linux/amd64)
                items+='{"platform":"linux/amd64","runner":"ubuntu-latest","hardware":"x86_64"},'
                ;;
              linux/arm64)
                items+='{"platform":"linux/arm64","runner":"ubuntu-24.04-arm","hardware":"aarch64"},'
                ;;
              "")
                continue
                ;;
              *)
                echo "::error::Unsupported platform '${p}'. Supported: linux/amd64, linux/arm64"
                exit 1
                ;;
            esac
          done
          if [ -z "${items}" ]; then
            echo "::error::No valid platforms found in '${PLATFORMS}'"
            exit 1
          fi
          json="{\"include\":[${items%,}]}"
          echo "matrix=${json}" >> "${GITHUB_OUTPUT}"

  # ────────────────────────────────────────────────────────────────
  # Per-platform build. Each shard runs on its native runner so
  # arm64 doesn't pay QEMU emulation cost. Full test + devel +
  # runtime pipeline runs per platform.
  # ────────────────────────────────────────────────────────────────
  build:
    needs: compute-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.compute-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check template version
        run: |
          LOCAL_VER=""
          if [ -f template/.version ]; then
            LOCAL_VER=$(cat template/.version | tr -d '[:space:]')
          fi
          if [ -n "${LOCAL_VER}" ]; then
            LATEST_VER=$(git ls-remote --tags --sort=-v:refname \
              https://github.com/ycpss91255-docker/template.git \
              | grep -oP 'refs/tags/v\d+\.\d+\.\d+$' | head -1 | sed 's|refs/tags/||')
            if [ -n "${LATEST_VER}" ] && [ "${LOCAL_VER}" != "${LATEST_VER}" ]; then
              echo "::warning::template ${LOCAL_VER} → ${LATEST_VER} available"
            else
              echo "template is up to date (${LOCAL_VER})"
            fi
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Generate .env
        run: |
          cat > .env << EOF
          USER_NAME=ci
          USER_GROUP=ci
          USER_UID=1000
          USER_GID=1000
          HARDWARE=${{ matrix.hardware }}
          DOCKER_HUB_USER=ci
          GPU_ENABLED=false
          IMAGE_NAME=${{ inputs.image_name }}
          WS_PATH=/tmp/workspace
          EOF
          mkdir -p /tmp/workspace

      - name: Build test stage (includes smoke tests)
        # The downstream Dockerfile consumes TEST_TOOLS_IMAGE as the
        # source of `COPY --from=${TEST_TOOLS_IMAGE}`; buildx auto-pulls
        # the image from GHCR on `COPY --from=<name:tag>` when the tag
        # is not present locally, so no explicit docker-pull step is
        # needed here. Public visibility of the GHCR package means
        # anonymous pull works, keeping the build-args simple.
        #
        # `inputs.test_tools_version` lets the caller pin the
        # test-tools image tag to whichever template release they
        # upgraded from (e.g. `test_tools_version: v0.10.1`). Default
        # `latest` tracks whatever the most recent template release
        # published — fine for non-tagged CI, but downstream repos
        # cutting their own release should pin explicitly for
        # reproducibility (the earlier GITHUB_WORKFLOW_REF auto-parse
        # was wrong: that ref is the caller's own tag, not template's).
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.dockerfile_path || format('{0}/Dockerfile', inputs.context_path) }}
          target: test
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
            HARDWARE=${{ matrix.hardware }}
            TEST_TOOLS_IMAGE=ghcr.io/ycpss91255-docker/test-tools:${{ inputs.test_tools_version }}
            ${{ inputs.build_args }}

      - name: Build devel stage
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.dockerfile_path || format('{0}/Dockerfile', inputs.context_path) }}
          target: devel
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
            HARDWARE=${{ matrix.hardware }}
            ${{ inputs.build_args }}

      - name: Build runtime stage
        if: ${{ inputs.build_runtime }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context_path }}
          file: ${{ inputs.dockerfile_path || format('{0}/Dockerfile', inputs.context_path) }}
          target: runtime
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            USER=ci
            GROUP=ci
            UID=1000
            GID=1000
            ${{ inputs.build_args }}

  # ────────────────────────────────────────────────────────────────
  # Stable-name aggregator so downstream branch-protection rules
  # keep working. Keeping this job's name as `docker-build`
  # preserves the status-check context that public-ycpss91255-docker
  # container repos currently require on their `main` branch
  # (`call-docker-build / docker-build`). Matrix shards publish as
  # `call-docker-build / build (linux/amd64)` etc. — those are the
  # actual build runs; this one just gates on them.
  # ────────────────────────────────────────────────────────────────
  docker-build:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate matrix result
        run: |
          result="${{ needs.build.result }}"
          echo "Matrix build result: ${result}"
          if [ "${result}" != "success" ]; then
            exit 1
          fi
