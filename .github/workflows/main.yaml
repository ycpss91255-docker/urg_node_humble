name: Main CI/CD Pipeline
run-name: ${{ github.actor }} triggered CI/CD on ${{ github.ref_name }}

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  call-lint:
    permissions:
      contents: read
    uses: ./.github/workflows/lint-worker.yaml

  call-docker-build:
    permissions:
      contents: read
    uses: ./.github/workflows/build-worker.yaml

  call-release:
    needs: [call-lint, call-docker-build]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    uses: ./.github/workflows/release-worker.yaml
    secrets: inherit
